<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>字字珠玑 · 华文听写练习</title>
<style>
:root{
  --paper: #F3EEDF;
  --paper-deep: #ECE4CF;
  --ink: #2A241F;
  --ink-soft: #5B5048;
  --seal: #B23A2E;
  --seal-deep: #8E2C22;
  --bamboo: #5C7A5E;
  --bamboo-deep: #44604A;
  --gold: #B8893F;
  --grid-line: #C8463A;
  --card-line: #D8CDB0;
  --shadow: 0 2px 10px rgba(42,36,31,0.10), 0 1px 2px rgba(42,36,31,0.08);
  --shadow-lg: 0 8px 28px rgba(42,36,31,0.18), 0 2px 6px rgba(42,36,31,0.10);
  --radius: 14px;
  --serif: "Songti SC","Noto Serif SC","STSong","SimSun",serif;
  --sans: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top left, rgba(184,137,63,0.07), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(92,122,94,0.06), transparent 50%),
    var(--paper);
  background-attachment:fixed;
  color:var(--ink);
  font-family:var(--sans);
  min-height:100vh;
  -webkit-tap-highlight-color: transparent;
}
.paper-texture{
  position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.5;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0px, transparent 1px, transparent 2px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.012) 0px, transparent 1px, transparent 2px);
}
#app{position:relative; z-index:1; max-width:760px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

/* ---------- Header ---------- */
header.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px 12px 22px;
  position:sticky; top:0; z-index:50;
  background:linear-gradient(180deg, var(--paper) 70%, rgba(243,238,223,0));
}
.brand{display:flex; align-items:center; gap:10px;}
.brand .seal-mark{
  width:38px; height:38px; border-radius:8px;
  background:var(--seal); color:#fff; display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:20px; font-weight:700; box-shadow:var(--shadow);
  transform:rotate(-3deg);
  flex-shrink:0;
}
.brand h1{font-family:var(--serif); font-size:19px; margin:0; letter-spacing:1px; line-height:1.2;}
.brand .sub{font-size:11px; color:var(--ink-soft); letter-spacing:1px;}
.countdown{
  text-align:right; font-size:12px; color:var(--ink-soft); line-height:1.5;
}
.countdown b{font-family:var(--serif); font-size:20px; color:var(--seal); display:block;}
.icon-btn{
  background:none; border:1.5px solid var(--card-line); border-radius:10px;
  width:38px; height:38px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink-soft); font-size:17px; flex-shrink:0;
}
.icon-btn:active{background:var(--paper-deep);}

main{flex:1; padding:0 18px 100px 18px;}

/* ---------- Cards / Sections ---------- */
.card{
  background:#FBF8F0;
  border:1px solid var(--card-line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 20px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:5px;
  background:repeating-linear-gradient(180deg, var(--seal) 0 7px, transparent 7px 14px);
  opacity:0.55;
}
.card-inner{margin-left:6px;}
h2.section-title{
  font-family:var(--serif); font-size:16px; margin:26px 0 10px 2px; color:var(--ink);
  display:flex; align-items:center; gap:8px;
}
h2.section-title .tag{
  font-size:10.5px; background:var(--bamboo); color:#fff; padding:2px 8px; border-radius:20px; font-family:var(--sans); font-weight:600; letter-spacing:1px;
}

/* ---------- Hero / Dashboard ---------- */
.hero{
  text-align:center; padding:22px 10px 8px 10px;
}
.hero .big-num{font-family:var(--serif); font-size:54px; color:var(--seal); line-height:1; letter-spacing:2px;}
.hero .big-label{font-size:13px; color:var(--ink-soft); margin-top:4px;}
.stat-row{display:flex; gap:10px; margin-top:18px;}
.stat-box{
  flex:1; background:#FBF8F0; border:1px solid var(--card-line); border-radius:12px;
  padding:12px 6px; text-align:center;
}
.stat-box .n{font-family:var(--serif); font-size:22px; color:var(--ink);}
.stat-box .l{font-size:11px; color:var(--ink-soft); margin-top:2px;}
.stat-box.due .n{color:var(--seal);}
.stat-box.mastered .n{color:var(--bamboo-deep);}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--sans); font-weight:600; font-size:15px;
  border-radius:11px; border:none; cursor:pointer; padding:14px 20px;
  transition:transform .08s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--seal); color:#fff; box-shadow:var(--shadow);}
.btn-secondary{background:var(--bamboo); color:#fff;}
.btn-outline{background:transparent; color:var(--ink); border:1.5px solid var(--card-line);}
.btn-ghost{background:var(--paper-deep); color:var(--ink-soft);}
.btn-block{width:100%;}
.btn-row{display:flex; gap:10px; margin-top:14px;}
.btn[disabled]{opacity:0.4; cursor:not-allowed;}

.mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.mode-card{
  background:#FBF8F0; border:1.5px solid var(--card-line); border-radius:12px;
  padding:14px 12px; cursor:pointer; text-align:left;
}
.mode-card.active{border-color:var(--seal); background:#FCF1EC;}
.mode-card .mi{font-size:22px;}
.mode-card .mt{font-family:var(--serif); font-size:14.5px; margin-top:6px;}
.mode-card .md{font-size:11px; color:var(--ink-soft); margin-top:2px; line-height:1.4;}

/* ---------- Lesson picker ---------- */
.lesson-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:8px; margin-top:10px;}
.lesson-chip{
  border:1.5px solid var(--card-line); background:#FBF8F0; border-radius:10px;
  padding:8px 4px; text-align:center; cursor:pointer; font-size:12.5px; position:relative;
}
.lesson-chip .num{font-family:var(--serif); font-size:16px; display:block;}
.lesson-chip.sel{border-color:var(--bamboo); background:#EFF4EE; color:var(--bamboo-deep);}
.lesson-chip .dot{position:absolute; top:4px; right:4px; width:7px; height:7px; border-radius:50%; background:var(--seal); display:none;}
.lesson-chip.has-due .dot{display:block;}
.grade-tabs{display:flex; gap:8px; margin-top:4px;}
.grade-tab{
  flex:1; text-align:center; padding:9px; border-radius:10px; cursor:pointer;
  border:1.5px solid var(--card-line); font-weight:600; font-size:13.5px; color:var(--ink-soft);
}
.grade-tab.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}

/* ---------- Practice screen ---------- */
.practice-wrap{display:flex; flex-direction:column; min-height:calc(100vh - 70px);}
.progress-bar-track{height:6px; background:var(--paper-deep); border-radius:4px; overflow:hidden; margin:6px 0 18px 0;}
.progress-bar-fill{height:100%; background:linear-gradient(90deg,var(--gold),var(--seal)); border-radius:4px; transition:width .3s ease;}
.prompt-card{
  background:#FBF8F0; border:1px solid var(--card-line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:20px; text-align:center; position:relative;
}
.lesson-tag{font-size:11.5px; color:var(--ink-soft); letter-spacing:0.5px;}
.lesson-tag b{color:var(--seal);}
.pinyin-display{font-family:var(--sans); font-size:24px; letter-spacing:2px; color:var(--ink); margin:10px 0 2px 0; font-weight:600;}
.context-sentence{font-size:17px; line-height:2; margin:14px 4px 4px 4px; color:var(--ink);}
.blank-marker{
  display:inline-block; min-width:2.2em; border-bottom:2px solid var(--seal); margin:0 2px; color:transparent;
}
.context-sentence.revealed .blank-marker{color:var(--seal); border-bottom-style:dashed; font-weight:700;}
.speak-btn{
  margin-top:14px; background:var(--gold); color:#fff; border:none; border-radius:30px;
  padding:9px 20px; font-size:13.5px; font-weight:600; cursor:pointer; display:inline-flex; gap:6px; align-items:center;
}
.speak-btn:active{transform:scale(0.96);}
.hint-text{font-size:12px; color:var(--ink-soft); margin-top:10px;}

/* canvas writing area */
.write-zone{margin-top:18px; position:relative;}
.grid-cells{display:flex; justify-content:center; gap:8px; flex-wrap:wrap;}
.cell{position:relative; flex-shrink:0;}
.cell canvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}
.cell .guide{background:#fff; border:1.5px solid var(--grid-line); border-radius:6px;}
.lined-area{position:relative; width:100%; max-width:520px; height:170px; margin:0 auto; background:#fff; border:1.5px solid var(--card-line); border-radius:8px; overflow:hidden;}
.lined-area canvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none; background:transparent;}

.write-tools{display:flex; justify-content:center; gap:10px; margin-top:12px;}
.tool-btn{
  background:var(--paper-deep); border:none; border-radius:9px; padding:8px 14px; font-size:12.5px;
  color:var(--ink-soft); cursor:pointer; font-weight:600;
}

.answer-reveal{
  margin-top:18px; padding:16px; background:#FCF7EC; border:1px dashed var(--gold); border-radius:12px;
  display:none;
}
.answer-reveal.show{display:block;}
.answer-hanzi{font-family:var(--serif); font-size:30px; letter-spacing:4px; color:var(--seal-deep);}
.answer-pinyin{font-size:13px; color:var(--ink-soft); margin-top:4px;}
.answer-full{font-size:16px; line-height:1.8; margin-top:6px;}
.answer-full .focusword{color:var(--seal); font-weight:700; text-decoration:underline; text-decoration-style:wavy;}

.self-mark-row{display:flex; gap:10px; margin-top:16px;}
.mark-btn{
  flex:1; padding:15px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.mark-wrong{background:#F4E2DE; color:var(--seal-deep);}
.mark-right{background:#E4ECE2; color:var(--bamboo-deep);}
.mark-btn:active{transform:scale(0.97);}

/* MCQ */
.mcq-options{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px;}
.mcq-opt{
  padding:16px 8px; border-radius:12px; border:1.5px solid var(--card-line); background:#fff;
  font-family:var(--serif); font-size:24px; cursor:pointer;
}
.mcq-opt.correct{border-color:var(--bamboo); background:#E4ECE2; color:var(--bamboo-deep);}
.mcq-opt.wrong{border-color:var(--seal); background:#F4E2DE; color:var(--seal-deep);}

/* seal stamp animation */
.stamp-pop{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:200;
  font-family:var(--serif); font-size:90px; color:var(--seal); border:6px solid var(--seal); border-radius:16px;
  padding:6px 18px; pointer-events:none; opacity:0; transform:translate(-50%,-50%) rotate(-12deg) scale(0.4);
}
.stamp-pop.go{animation:stampGo .55s ease-out forwards;}
@keyframes stampGo{
  0%{opacity:0; transform:translate(-50%,-50%) rotate(-12deg) scale(0.3);}
  55%{opacity:0.95; transform:translate(-50%,-50%) rotate(-12deg) scale(1.08);}
  75%{opacity:0.95; transform:translate(-50%,-50%) rotate(-12deg) scale(0.96);}
  100%{opacity:0; transform:translate(-50%,-50%) rotate(-12deg) scale(1);}
}

/* bottom nav */
nav.bottombar{
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  background:#FBF8F0; border-top:1px solid var(--card-line);
  display:flex; max-width:760px; margin:0 auto;
  padding:6px 6px calc(6px + env(safe-area-inset-bottom)) 6px;
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0;
  background:none; border:none; color:var(--ink-soft); font-size:10.5px; cursor:pointer; border-radius:10px;
}
.nav-btn .ni{font-size:19px;}
.nav-btn.active{color:var(--seal);}

/* stats */
.error-list{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
.error-item{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; background:#FBF8F0; border:1px solid var(--card-line); border-radius:10px;
}
.error-item .w{font-family:var(--serif); font-size:17px;}
.error-item .meta{font-size:11px; color:var(--ink-soft);}
.error-item .lapses{
  background:var(--seal); color:#fff; font-size:11px; padding:2px 8px; border-radius:12px; font-weight:700;
}
.bar-row{display:flex; align-items:center; gap:8px; margin:6px 0;}
.bar-row .lbl{width:74px; font-size:11.5px; color:var(--ink-soft); flex-shrink:0;}
.bar-track{flex:1; height:10px; background:var(--paper-deep); border-radius:6px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg,var(--bamboo),var(--bamboo-deep));}
.bar-pct{width:34px; font-size:11px; text-align:right; color:var(--ink-soft); flex-shrink:0;}

.empty-state{text-align:center; padding:40px 16px; color:var(--ink-soft);}
.empty-state .ei{font-size:38px; margin-bottom:8px;}

textarea.tip-edit{
  width:100%; min-height:70px; border:1px solid var(--card-line); border-radius:8px; padding:10px;
  font-family:var(--sans); font-size:13px; resize:vertical; background:#fff;
}

.tag-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.pill{font-size:11.5px; background:var(--paper-deep); color:var(--ink-soft); padding:4px 10px; border-radius:20px;}

.modal-bg{
  position:fixed; inset:0; background:rgba(42,36,31,0.45); z-index:100; display:none;
  align-items:flex-end; justify-content:center;
}
.modal-bg.show{display:flex;}
.modal-sheet{
  background:var(--paper); width:100%; max-width:760px; border-radius:20px 20px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom)) 20px; max-height:85vh; overflow-y:auto;
  box-shadow:0 -8px 30px rgba(0,0,0,0.2);
}
.modal-handle{width:40px; height:4px; background:var(--card-line); border-radius:3px; margin:0 auto 14px auto;}

.screen{display:none;}
.screen.active{display:block;}

@media (max-width:380px){
  .hero .big-num{font-size:44px;}
}
</style>
</head>
<body>
<div class="paper-texture"></div>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal-mark">字</div>
      <div>
        <h1>字字珠玑</h1>
        <div class="sub">梦溪华文听写 · 五六年级</div>
      </div>
    </div>
    <div class="countdown" id="examCountdown">
      <b id="examDays">--</b>距考试
    </div>
  </header>

  <main id="mainArea">
    <div class="screen active" id="screen-home"></div>
    <div class="screen" id="screen-lessons"></div>
    <div class="screen" id="screen-practice"></div>
    <div class="screen" id="screen-stats"></div>
    <div class="screen" id="screen-admin"></div>
  </main>

  <nav class="bottombar">
    <button class="nav-btn active" data-nav="home"><span class="ni">🏠</span>首页</button>
    <button class="nav-btn" data-nav="lessons"><span class="ni">📖</span>选课文</button>
    <button class="nav-btn" data-nav="practice"><span class="ni">✍️</span>开始练习</button>
    <button class="nav-btn" data-nav="stats"><span class="ni">📊</span>错字本</button>
  </nav>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="section-title">⚙️ 设置</h2>
    <div id="settingsContent"></div>
  </div>
</div>

<div class="stamp-pop" id="stampPop">✓</div>

<script>
// 梦溪华文听写表 - 五年级(1-17课) + 六年级(1-12课) 完整数据

const LESSONS = [

  {w:"手电筒",p:"shǒu diàn tǒng"},{w:"防止意外",p:"fáng zhǐ yì wài"},{w:"单独行动",p:"dān dú xíng dòng"},

 ],
 sentences:[

  {w:"生日聚会",p:"shēng rì jù huì"},{w:"收到祝福",p:"shōu dào zhù fú"},{w:"一份礼物",p:"yī fèn lǐ wù"},
  {w:"七嘴八舌",p:"qī zuǐ bā shé"},{w:"安慰朋友",p:"ān wèi péng yǒu"},{w:"感到烦恼",p:"gǎn dào fán nǎo"},
  {w:"语重心长",p:"yǔ zhòng xīn cháng"},{w:"对牛弹琴",p:"duì niú tán qín"},{w:"半信半疑",p:"bàn xìn bàn yí"}

// ---------- 工具函数 ----------
function isHanzi(ch){ return /[\u4e00-\u9fa5]/.test(ch); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function addDays(dateStr, n){ const d=new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

// ---------- 构建题库（拍平所有词语/句子为练习项） ----------
let ITEMS = []; // {id, kind:'word'|'sentence', lessonId, grade, lessonNum, lessonTitle, text, pinyin, focus, full, moxie}
function buildItems(){
  ITEMS = [];
  LESSONS.forEach(lesson=>{
    lesson.words.forEach((w,idx)=>{
      ITEMS.push({
        id:`${lesson.id}:w:${idx}`, kind:'word', lessonId:lesson.id, grade:lesson.grade,
        lessonNum:lesson.lesson, lessonTitle:lesson.title, text:w.w, pinyin:w.p
      });
    });
    lesson.sentences.forEach((s,idx)=>{
      ITEMS.push({
        id:`${lesson.id}:s:${idx}`, kind:'sentence', lessonId:lesson.id, grade:lesson.grade,
        lessonNum:lesson.lesson, lessonTitle:lesson.title, full:s.t, focus:s.f||null, moxie:!!s.moxie
      });
    });
  });
}
buildItems();

// ---------- 持久化存储 ----------
// 字字珠玑独立运行时（脱离 Claude artifacts 环境，作为"添加到主屏幕"网页应用），
// 用浏览器原生 localStorage 模拟出和 window.storage 完全一样的接口，
// 这样上面所有调用 window.storage.get/set 的代码完全不用改。
// 如果当前环境本身就提供了真正的 window.storage（比如还在 Claude 里预览），优先用真的。
if(!window.storage){
  const LS_PREFIX = 'zzzhj_'; // 字字珠玑专属前缀，避免和同一浏览器里其他网页的 localStorage 冲突
  function lsKey(key, shared){ return LS_PREFIX + (shared?'shared_':'p_') + key; }
  window.storage = {
    async get(key, shared){
      let raw;
      try{ raw = localStorage.getItem(lsKey(key, shared)); }
      catch(e){ throw new Error('localStorage unavailable: '+e.message); }
      if(raw === null) throw new Error('key not found: '+key); // 和原 window.storage 行为保持一致：不存在时抛错
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      try{ localStorage.setItem(lsKey(key, shared), value); }
      catch(e){ console.warn('保存失败（可能是隐私浏览模式或存储已满）：', e.message); return null; }
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      try{ localStorage.removeItem(lsKey(key, shared)); }catch(e){}
      return { key, deleted:true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = [];
      try{
        const pfx = LS_PREFIX + (shared?'shared_':'p_') + (prefix||'');
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(pfx)) keys.push(k.slice((LS_PREFIX + (shared?'shared_':'p_')).length));
        }
      }catch(e){}
      return { keys, prefix, shared: !!shared };
    }
  };
}

async function loadAll(){
  try{
    const r = await window.storage.get('progress', false);
    if(r && r.value) PROGRESS = JSON.parse(r.value);
  }catch(e){ PROGRESS = {}; }

      SETTINGS.selectedLessons = SETTINGS.selectedLessons.concat(newLessons);

  try{
    const r3 = await window.storage.get('customTips', false);
    if(r3 && r3.value) CUSTOM_TIPS = JSON.parse(r3.value);
  }catch(e){ CUSTOM_TIPS = {}; }
  await loadAdminData();
}

function getState(itemId){
  if(!PROGRESS[itemId]){
    // g5-20整个单元，或在难词列表里的条目，初始ease降至1.8（复习频率更高）
    const isHard = itemId.startsWith('g5-20:') || HARD_ITEM_IDS.has(itemId);
    PROGRESS[itemId] = {ease: isHard ? 1.8 : 2.5, interval:0, reps:0, lapses:0, due:todayStr(), seen:false};
  }
  return PROGRESS[itemId];
}

// ---------- SRS 算法（简化版 SM-2） ----------
function reviewItem(itemId, correct){
  const st = getState(itemId);
  st.seen = true;
  if(correct){
    st.reps += 1;
    if(st.reps === 1) st.interval = 1;
    else if(st.reps === 2) st.interval = 3;
    else st.interval = Math.round(st.interval * st.ease);
    st.ease = Math.min(2.9, st.ease + 0.04);
    st.due = addDays(todayStr(), st.interval);
    st.lastResult = 'right';
  } else {
    st.reps = 0;
    st.interval = 1;
    st.ease = Math.max(1.3, st.ease - 0.22);
    st.lapses = (st.lapses||0) + 1;
    st.due = todayStr(); // 当天重练
    st.lastResult = 'wrong';
  }
  saveProgress();
}

function masteryLevel(st){
  if(!st || !st.seen) return 0;
  if(st.lapses>0 && st.reps<2) return 1; // 易错
  if(st.reps>=4) return 3; // 熟练
  if(st.reps>=1) return 2; // 学习中
  return 1;
}

  return ITEMS.filter(it=>sel.has(it.lessonId));
}
function interleaveByLesson(items){
  // 同一课内部保持原有顺序（如词语1再词语2），但在课与课之间轮流抽取，
  // 避免新词额度被排在最前面的一课用完，导致后面选中的课文永远轮不到。
  const byLesson = new Map();
  const lessonOrder = [];
  items.forEach(it=>{
    if(!byLesson.has(it.lessonId)){ byLesson.set(it.lessonId, []); lessonOrder.push(it.lessonId); }
    byLesson.get(it.lessonId).push(it);
  });
  const result = [];
  let added = true;
  while(added){
    added = false;
    for(const lid of lessonOrder){
      const bucket = byLesson.get(lid);
      if(bucket.length){ result.push(bucket.shift()); added = true; }
    }
  }
  return result;
}
function dueQueue(limit, kindFilter){
  let items = selectedItems();
  if(kindFilter) items = items.filter(it=>it.kind===kindFilter);
  const today = todayStr();
  const due = [];
  const fresh = [];
  items.forEach(it=>{
    const st = PROGRESS[it.id];
    if(st && (st.tooEasy || 0) >= 3) return; // 永久跳过
    if(st && st.seen){
      if(st.due <= today) due.push(it);
    } else {
      fresh.push(it);
    }
  });
  // 优先：错题多的 due 项 > 一般 due 项 > 新项（在所选课文之间轮流抽取，控制每日新词数量）
  due.sort((a,b)=> (PROGRESS[b.id].lapses||0) - (PROGRESS[a.id].lapses||0));
  fresh.sort((a,b)=> a.grade-b.grade || a.lessonNum - b.lessonNum || a.id.localeCompare(b.id));
  const interleavedFresh = interleaveByLesson(fresh);
  const newBudget = Math.max(0, SETTINGS.dailyNew);
  const queue = due.concat(interleavedFresh.slice(0, newBudget));
  // 完整随机打散（Fisher-Yates），让不同设备/不同次打开的题目顺序有明显差异
  for(let i=queue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]]=[queue[j],queue[i]];
  }
  return limit ? queue.slice(0,limit) : queue;
}

// ---------- 统计 ----------
function computeStats(){
  const items = selectedItems();
  let mastered=0, learning=0, weak=0, untouched=0;
  let dueToday=0;
  const today = todayStr();
  items.forEach(it=>{
    const st = PROGRESS[it.id];
    const lvl = masteryLevel(st);
    if(lvl===0) untouched++;
    else if(lvl===1) weak++;
    else if(lvl===2) learning++;
    else mastered++;
    if(st && st.seen && st.due<=today) dueToday++;
    else if(!st || !st.seen) { /* counted separately as new */ }
  });
  const total = items.length;
  const score = total ? Math.round((weak*0.3 + learning*0.6 + mastered*1.0) / total * 100) : 0;
  return {total, mastered, learning, weak, untouched, dueToday, newCount: untouched, score};
}
function lessonStats(lessonId){
  const items = ITEMS.filter(it=>it.lessonId===lessonId);
  let mastered=0, learning=0, weak=0, touched=0;
  items.forEach(it=>{
    const st = PROGRESS[it.id];
    if(st && st.seen){
      touched++;
      const lvl = masteryLevel(st);
      if(lvl===3) mastered++;
      else if(lvl===2) learning++;
      else if(lvl===1) weak++;
    }
  });
  const total = items.length;
  // 加权进度分：易错按30%、学习中按60%、已掌握按100%计入，避免"做了很多题但全部显示0%"的误导
  const score = total ? Math.round((weak*0.3 + learning*0.6 + mastered*1.0) / total * 100) : 0;
  return {total, touched, mastered, learning, weak, score};
}
function hasDueInLesson(lessonId){
  const today = todayStr();
  return ITEMS.some(it=>it.lessonId===lessonId && PROGRESS[it.id] && PROGRESS[it.id].seen && PROGRESS[it.id].due<=today);
}

const DEFAULT_BLOCKED_CHARS = [
 '了','着','在','是','有','我','你','他','她','它','们','这','那','哪',
 '一','二','三','四','五','六','七','八','九','十','百','千','万',

 '以','为','于','所','其','可','能','会','要','自','已'
].filter((v,i,a)=>a.indexOf(v)===i); // 去重

let BLOCKED_CHARS = new Set(DEFAULT_BLOCKED_CHARS);
let CUSTOM_CONFUSABLES = []; // 用户新增的精选题
let DELETED_BUILTIN_KEYS = new Set(); // 被用户删除/屏蔽的内置精选题（按其在 CONFUSABLES 中的下标）

// 合并内置题库（去掉被删除的）+ 用户自定义题库，统一带上来源标记
function effectiveConfusables(){
  const builtin = CONFUSABLES.map((c,idx)=>({...c, _src:'builtin', _key:'cur:'+idx}))
    .filter(c=>!DELETED_BUILTIN_KEYS.has(c._key));
  const custom = CUSTOM_CONFUSABLES.map(c=>({...c, _src:'custom', _key:'usr:'+c.id}));
  return builtin.concat(custom);
}
function newCustomId(){ return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ---------- 选择题（形近字辨析）动态出题 ----------
function buildHanziBank(){
  const set = new Set();
  selectedItems().forEach(it=>{
    const text = it.kind==='word' ? it.text : it.full;
    text.split('').forEach(ch=>{ if(isHanzi(ch)) set.add(ch); });
  });
  return Array.from(set);
}
function buildHanziFreq(){
  const freq = {};
  selectedItems().forEach(it=>{
    const text = it.kind==='word' ? it.text : it.full;
    text.split('').forEach(ch=>{ if(isHanzi(ch)) freq[ch]=(freq[ch]||0)+1; });
  });
  return freq;
}
function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
// 从候选字中挑选出题目标：排除屏蔽字；优先选在所选课文范围内出现频率较低（更有学习价值、更不常见）的字
function pickTargetChar(candidateChars, hanziFreq){
  let pool = candidateChars.filter(ch=>!BLOCKED_CHARS.has(ch));
  if(pool.length===0) pool = candidateChars; // 兜底：如果整词都被屏蔽了，还是要能出题
  const withFreq = pool.map(ch=>({ch, f: hanziFreq[ch]||1}));
  const minFreq = Math.min(...withFreq.map(x=>x.f));
  // 只在"较少见"的那一批字里随机选（频率 <= 最低频率+1 的都算候选），让生僻/有特色的字优先被考
  const lowFreqOnes = withFreq.filter(x=>x.f <= minFreq + 1).map(x=>x.ch);
  return lowFreqOnes[Math.floor(Math.random()*lowFreqOnes.length)];
}
// 为某个具体的练习条目生成一道选择题：优先使用精选题库（同课文+同字），否则从同一批课文的汉字中动态抽干扰项
function generateMCQForItem(item, hanziBank, usedKeys, hanziFreq){
  const sourceText = item.kind==='word' ? item.text : item.full;
  const targetPool = item.kind==='sentence' && item.focus ? item.focus : sourceText;
  const candidateChars = targetPool.split('').filter(isHanzi);
  if(candidateChars.length===0) return null;

  // 1) 尝试匹配精选题库（含用户自定义、排除被删除的内置题）：同课文 + 目标字属于该题的字
  //    同时做数据完整性校验（例句须含答案字、选项须含答案且互不重复），有问题的条目直接跳过，改走动态生成兜底
  const allConfusables = effectiveConfusables();
  const curatedMatches = allConfusables.filter(c=>{
    if(usedKeys.has(c._key)) return false;
    // 多空题（blank含顿号，如"地、的、得"）：句子用__占位，不走candidateChars匹配
    const isMultiBlank = c.blank.includes('、');
    if(isMultiBlank) return false; // 多空题由专项通道单独触发，不走常规匹配
    // 单字题：常规校验
    return c.lessonId===item.lessonId && candidateChars.includes(c.blank) &&
      (c.sentence.includes(c.blank) || c.sentence.includes('__')) &&
      c.options.includes(c.blank) && new Set(c.options).size===c.options.length;
  });
  if(curatedMatches.length>0){
    const pick = curatedMatches[Math.floor(Math.random()*curatedMatches.length)];
    usedKeys.add(pick._key);
    return {
      sentence: pick.sentence, blank: pick.blank,
      options: shuffleArr(pick.options), note: pick.note,
      key: pick._key
    };
  }

  // 2) 动态生成：优先选不常见、更有学习价值的字（排除虚词/简单字），干扰项来自本次所选课文范围内出现过的其它汉字
  const correct = pickTargetChar(candidateChars, hanziFreq || {});
  const pool = (hanziBank.length>6 ? hanziBank : Array.from(new Set(hanziBank.concat(['的','地','得','了','着','在']))))
    .filter(ch=>ch!==correct);
  const shuffledPool = shuffleArr(pool);
  const distractors = [];
  for(const ch of shuffledPool){
    if(distractors.length>=3) break;
    if(!distractors.includes(ch)) distractors.push(ch);
  }
  const options = shuffleArr([correct, ...distractors]);
  return {
    sentence: sourceText, blank: correct, options,
    note: `本题选自 ${item.grade}年级 第${item.lessonNum}课《${item.lessonTitle}》`,
    key: 'dyn:'+item.id+':'+correct
  };
}

// ---------- 画布手写（米字格） ----------
function drawGuide(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = '#D7847C';
  ctx.setLineDash([4,4]);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w/2,0); ctx.lineTo(w/2,h);
  ctx.moveTo(0,h/2); ctx.lineTo(w,h/2);
  ctx.moveTo(0,0); ctx.lineTo(w,h);
  ctx.moveTo(w,0); ctx.lineTo(0,h);
  ctx.stroke();
  ctx.setLineDash([]);
}
function drawLines(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = '#D7847C';
  ctx.setLineDash([4,4]);
  ctx.lineWidth = 1;
  const rows = 3;
  for(let i=1;i<rows;i++){
    const y = h*i/rows;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  ctx.setLineDash([]);
}
function setupInkCanvas(canvas){
  const ctx = canvas.getContext('2d');
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#262220';
  let drawing=false, last=null;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
    return {x: cx * canvas.width/rect.width, y: cy * canvas.height/rect.height};
  }
  function start(e){ e.preventDefault(); drawing=true; last=pos(e); }
  function move(e){
    if(!drawing) return; e.preventDefault();
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last = p;
  }
  function end(e){ drawing=false; }
  canvas.addEventListener('pointerdown', start);
  canvas.addEventListener('pointermove', move);
  window.addEventListener('pointerup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}
function clearInk(canvas){
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function buildCellWriter(container, count){
  container.innerHTML = '';
  const cells = [];
  // 动态计算格子边长：每行最多放4个字（超过4个才换行），按实际换行后每行的字数计算尺寸，
  // 这样长词换行后格子也能尽量大，而不是按"塞满一行"的假设挤压尺寸
  const gap = 8;
  const maxPerRow = 3;
  const rows = Math.ceil(count / maxPerRow) || 1;
  const perRow = Math.ceil(count / rows); // 实际每行字数（让多行排布更均匀，比如6字=3+3而不是4+2）
  const containerWidth = container.clientWidth || (window.innerWidth - 56);
  let size = Math.floor((containerWidth - gap * (perRow - 1)) / perRow);
  size = Math.max(64, Math.min(112, size)); // 64~112px 之间，不会小到难写，也不会大到离谱
  for(let i=0;i<count;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.width = size + 'px';
    cell.style.height = size + 'px';
    const guide = document.createElement('canvas');
    guide.className = 'guide'; guide.width=200; guide.height=200;
    const ink = document.createElement('canvas');
    ink.width=200; ink.height=200;
    cell.appendChild(guide); cell.appendChild(ink);
    container.appendChild(cell);
    drawGuide(guide);
    setupInkCanvas(ink);
    cells.push(ink);
  }
  return cells;
}
function buildLineWriter(container){
  container.innerHTML = '';
  const guide = document.createElement('canvas');
  guide.width=1040; guide.height=300;
  const ink = document.createElement('canvas');
  ink.width=1040; ink.height=300;
  container.appendChild(guide); container.appendChild(ink);
  drawLines(guide);
  setupInkCanvas(ink);
  return [ink];
}

// ---------- 学习数据备份（导出/导入） ----------
// 独立运行（手机"添加到主屏幕"）时数据存在浏览器 localStorage 里，
// 万一换手机、清了浏览器数据、或者 iOS 本地文件场景下存储行为不稳定，
// 这里提供手动导出/导入一个 JSON 文件作为保险，避免几个月的学习记录彻底丢失。
const BACKUP_KEYS = ['progress','settings','customTips','blockedChars','customConfusables','deletedBuiltins'];
async function exportBackup(){
  const data = { app:'字字珠玑', exportedAt: new Date().toISOString(), version:1, data:{} };
  for(const key of BACKUP_KEYS){
    try{
      const r = await window.storage.get(key, false);
      if(r && r.value!=null) data.data[key] = r.value;
    }catch(e){ /* 该项没有数据，跳过 */ }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = todayStr();
  a.href = url;
  a.download = `字字珠玑备份_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('已导出备份文件，请保存好');
}
async function importBackup(file){
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || !parsed.data || parsed.app !== '字字珠玑'){
      alert('这不是字字珠玑的备份文件，无法导入。');
      return;
    }
    if(!confirm('导入备份会覆盖当前手机上的学习记录，确定要继续吗？')) return;
    for(const key of BACKUP_KEYS){
      if(parsed.data[key]!=null){
        await window.storage.set(key, parsed.data[key], false);
      }
    }
    toast('导入成功，正在刷新…');
    setTimeout(()=>location.reload(), 800);
  }catch(e){
    alert('导入失败：文件格式不正确或已损坏。');
  }
}

let SESSION = { queue:[], idx:0, correct:0, wrong:0, active:false, usedMCQKeys:new Set(), usedSentMaking:new Set(), hanziBank:[], hanziFreq:{} };

function startSession(){
  if(SETTINGS.selectedLessons.length===0){
    showScreen('lessons');
    return;
  }
  if(SETTINGS.mode==='sentmaking'){
    const pool = SENTENCE_MAKING_WORDS.length + SENTENCE_PATTERNS.length;
    const sessionLen = Math.min(SETTINGS.dailyNew || 12, pool);
    SESSION = { queue:new Array(sessionLen).fill(null), idx:0, correct:0, wrong:0, active:true,
      sessionLen, usedMCQKeys:new Set(), usedSentMaking:new Set(), hanziBank:[], hanziFreq:{} };
    showScreen('practice');
    renderCard();
    return;
  }
  const kindFilter = (SETTINGS.mode==='word' || SETTINGS.mode==='sentence') ? SETTINGS.mode : null;
  const baseQueue = dueQueue(40, kindFilter);
  if(baseQueue.length===0){
    showScreen('practice');
    renderSessionDone(true);
    return;
  }
  SESSION = { queue: baseQueue, idx:0, correct:0, wrong:0, active:true, sessionLen: baseQueue.length,
    usedMCQKeys:new Set(), usedSentMaking:new Set(), hanziBank: buildHanziBank(), hanziFreq: buildHanziFreq() };
  showScreen('practice');
  renderCard();
}

function sessionProgressHTML(){
  const pct = SESSION.sessionLen? Math.round((SESSION.idx/SESSION.sessionLen)*100) : 0;
  return `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);">
    <span>第 ${Math.min(SESSION.idx+1, SESSION.sessionLen)} / ${SESSION.sessionLen} 题</span>
    <span>✓ ${SESSION.correct} &nbsp; ✗ ${SESSION.wrong}</span>
  </div>`;
}

function renderCard(){
  const el = document.getElementById('screen-practice');
  if(!SESSION.active || SESSION.idx >= SESSION.sessionLen){
    renderSessionDone(false);
    return;
  }
  if(SETTINGS.mode==='sentmaking'){
    renderSentMakingCard(el);
    return;
  }
  const item = SESSION.queue[SESSION.idx];
  if(SETTINGS.mode==='mcq'){
    const q = generateMCQForItem(item, SESSION.hanziBank, SESSION.usedMCQKeys, SESSION.hanziFreq);
    if(q){ renderMCQCard(el, item, q); return; }
    // 极少数情况下该条目无法出选择题（没有合适的汉字），退化为对应的听写卡
    if(item.kind==='word') renderWordCard(el, item); else renderSentenceCard(el, item);
    return;
  }
  if(SETTINGS.mode==='word' || SETTINGS.mode==='sentence'){
    if(item.kind==='word') renderWordCard(el, item); else renderSentenceCard(el, item);
    return;
  }
  // 综合混合模式：按条目本身的类型渲染，小概率转为选择题（仍取材于同一条目）
  // 每隔约5题，插入一道「的/地/得」专项辨析题（独立触发，不依赖词语匹配）
  const deDiDePool = effectiveConfusables().filter(c=>('的地得'.includes(c.blank) || c.blank.includes('的') || c.blank.includes('地') || c.blank.includes('得')) && !SESSION.usedMCQKeys.has(c._key));
  const insertDeDiDe = deDiDePool.length > 0 && SESSION.idx > 0 && SESSION.idx % 5 === 0;
  if(insertDeDiDe){
    const pick = deDiDePool[Math.floor(Math.random()*deDiDePool.length)];
    SESSION.usedMCQKeys.add(pick._key);
    const q = { sentence:pick.sentence, blank:pick.blank, options:pick.options, note:pick.note, key:pick._key };
    renderMCQCard(el, item, q);
    return;
  }
  const mcqChance = item.kind==='word' ? 0.22 : 0.15;
  if(Math.random() < mcqChance){
    const q = generateMCQForItem(item, SESSION.hanziBank, SESSION.usedMCQKeys, SESSION.hanziFreq);
    if(q){ renderMCQCard(el, item, q); return; }
  }
  if(item.kind==='word') renderWordCard(el, item); else renderSentenceCard(el, item);
}

// ---------- 形近字辨析卡（MCQ） ----------
function renderMCQCard(el, item, q){
  // q.options 已在生成时洗牌，这里仍做一次保险洗牌，避免任何调用路径遗漏
  const shuffledOptions = shuffleArr(q.options);
  // 支持两种句子格式：
  // 1. 句子里含 __ 占位符（多空题，如的地得三合一题），直接替换 __ 为下划线标记
  // 2. 普通单字挖空：用 split(blank) 找位置
  let display;
  if(q.sentence.includes('__')){
    display = q.sentence.replace(/__/g, '<span class="blank-marker" style="color:var(--seal);border-bottom-style:dashed;">＿＿</span>');
  } else {
    display = q.sentence.split(q.blank).join('<span class="blank-marker" style="color:var(--seal);border-bottom-style:dashed;">＿</span>');
  }
  el.innerHTML = `
    ${sessionProgressHTML()}
    <div class="prompt-card">
      <div class="lesson-tag">形近字辨析 · ${item.grade}年级 第${item.lessonNum}课 <b>《${item.lessonTitle}》</b></div>
      <button class="speak-btn" id="speakBtn">🔊 朗读整句</button>
      <div class="context-sentence">${display}</div>
      <div class="hint-text">选出空白处正确的字</div>
      <div class="mcq-options" id="mcqOpts">
        ${shuffledOptions.map((o,i)=>`<div class="mcq-opt" data-o="${o}">${o}</div>`).join('')}
      </div>
      <div class="answer-reveal" id="revealBox">
        <div style="font-size:13px;color:var(--ink-soft);">💡 ${q.note}</div>
        ${q.note ? `<button class="btn btn-primary btn-block" id="nextBtn" style="margin-top:14px;display:none;">下一题 →</button>` : ''}
      </div>
      <div style="margin-top:14px;text-align:left;"><button class="tool-btn" id="flagBadBtn" style="color:var(--seal-deep);">🚫 这题出得不好</button></div>
    </div>
  `;
  document.getElementById('speakBtn').addEventListener('click', ()=>speak(q.sentence));
  speak(q.sentence);
  let answered = false;
  document.getElementById('flagBadBtn').addEventListener('click', ()=>{
    if(answered) return;
    answered = true;
    flagBadQuestion(q);
  });
  document.querySelectorAll('#mcqOpts .mcq-opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      if(answered) return;
      answered = true;
      const ok = opt.dataset.o === q.blank;
      document.querySelectorAll('#mcqOpts .mcq-opt').forEach(o2=>{
        if(o2.dataset.o===q.blank) o2.classList.add('correct');
        else if(o2===opt && !ok) o2.classList.add('wrong');
      });
      document.getElementById('revealBox').classList.add('show');
      if(ok) SESSION.correct++; else SESSION.wrong++;
      reviewItem(item.id, ok);
      flashStamp(ok);
      if(q.note){
        // 有解释的题：显示"下一题"按钮，让学生读完再跳
        const nextBtn = document.getElementById('nextBtn');
        if(nextBtn){
          nextBtn.style.display = 'block';
          nextBtn.addEventListener('click', ()=>{ SESSION.idx++; renderCard(); });
        }
      } else {
        setTimeout(()=>{ SESSION.idx++; renderCard(); }, 1100);
      }
    });
  });
}
function flagBadQuestion(q){
  if(q.key.startsWith('dyn:')){
    const ch = q.blank;
    BLOCKED_CHARS.add(ch);
    saveBlockedChars();
    toast(`已屏蔽「${ch}」，以后不会再用它出题（可在 设置→题库管理 里恢复）`);
  } else {
    const builtinMatch = q.key.startsWith('cur:');
    if(builtinMatch){ DELETED_BUILTIN_KEYS.add(q.key); saveDeletedBuiltins(); }
    else {
      const id = q.key.split(':')[1];
      CUSTOM_CONFUSABLES = CUSTOM_CONFUSABLES.filter(c=>c.id!==id);
      saveCustomConfusables();
    }
    toast('已屏蔽这道题，以后不会再出现');
  }
  SESSION.idx++;
  setTimeout(renderCard, 500);
}
function toast(msg){
  let t = document.getElementById('toastBox');
  if(!t){
    t = document.createElement('div');
    t.id = 'toastBox';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:12.5px;z-index:300;max-width:88%;text-align:center;box-shadow:var(--shadow-lg);transition:opacity .3s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 2400);
}

function renderSentMakingCard(el){
  const allPrompts = SENTENCE_MAKING_WORDS.map(w=>({text:w,isWord:true}))
    .concat(SENTENCE_PATTERNS.map(p=>({text:p,isWord:false})));
  let available = allPrompts.filter(p=>!SESSION.usedSentMaking.has(p.text));
  if(available.length===0){ SESSION.usedSentMaking.clear(); available = allPrompts; }
  const pick = available[Math.floor(Math.random()*available.length)];
  SESSION.usedSentMaking.add(pick.text);
  const prompt = pick.text, useWord = pick.isWord;
  el.innerHTML = `
    ${sessionProgressHTML()}
    <div class="prompt-card">
      <div class="lesson-tag">造句练习</div>
      <div class="pinyin-display" style="font-family:var(--serif);font-size:30px;">${prompt}</div>
      <div class="hint-text">请用以上${useWord?'词语':'句式'}写一句完整的句子</div>
      <div class="write-zone">
        <div class="lined-area" id="lineWrap"></div>
        <div class="write-tools"><button class="tool-btn" id="clearBtn">🧹 重写</button></div>
      </div>
      <div id="actionArea" style="margin-top:16px;">
        <button class="btn btn-primary btn-block" id="doneBtn">✅ 完成造句，下一题</button>
      </div>
    </div>
  `;
  const cells = buildLineWriter(document.getElementById('lineWrap'));
  document.getElementById('clearBtn').addEventListener('click', ()=>cells.forEach(clearInk));
  document.getElementById('doneBtn').addEventListener('click', ()=>{
    SESSION.correct++;
    flashStamp(true);
    SESSION.idx++;

    setTimeout(renderCard, 350);
  });
}

// ---------- 自评按钮 ----------
function showSelfMark(itemId){
  const st = getState(itemId);
  const tooEasyCount = st.tooEasy || 0;
  const easyLabel = tooEasyCount === 0 ? '这题太简单了' :
                    tooEasyCount === 1 ? '太简单了（再按1次不再出现）' :
                                         '太简单了（再按1次永久跳过）';
  document.getElementById('actionArea').innerHTML = `
    <div class="self-mark-row">
      <button class="mark-btn mark-wrong" id="markWrong">✗ 写错了</button>
      <button class="mark-btn mark-right" id="markRight">✓ 写对了</button>
    </div>
    <div style="text-align:left;margin-top:10px;">
      <button id="markEasy" style="background:none;border:none;font-size:12px;color:var(--ink-soft);cursor:pointer;padding:2px 0;text-decoration:underline dotted;">🌱 ${easyLabel}</button>
    </div>
  `;
  document.getElementById('markWrong').addEventListener('click', ()=>{
    SESSION.wrong++; reviewItem(itemId, false); flashStamp(false);
    SESSION.idx++; setTimeout(renderCard, 250);
  });
  document.getElementById('markRight').addEventListener('click', ()=>{
    SESSION.correct++; reviewItem(itemId, true); flashStamp(true);
    SESSION.idx++; setTimeout(renderCard, 250);
  });
  document.getElementById('markEasy').addEventListener('click', ()=>{
    const st = getState(itemId);
    st.tooEasy = (st.tooEasy || 0) + 1;
    if(st.tooEasy >= 3){
      // 永久跳过：due设为遥远未来，ease拉满，reps标大
      st.due = '9999-12-31'; st.ease = 2.9; st.interval = 9999; st.seen = true;
      saveProgress();
      toast('已永久跳过这道题，以后不会再出现');
      SESSION.correct++; SESSION.idx++; setTimeout(renderCard, 300);
    } else {
      // 第1/2次：大幅拉长复习间隔
      st.ease = 2.9; st.interval = st.tooEasy === 1 ? 30 : 90;
      st.due = addDays(todayStr(), st.interval); st.seen = true;
      saveProgress();
      toast(st.tooEasy === 1 ? '已减少出现频率（再按一次可永久跳过）' : '复习间隔已拉至三个月（再按一次可永久跳过）');
      SESSION.correct++; SESSION.idx++; setTimeout(renderCard, 300);
    }
  });
}

function flashStamp(ok){
  const s = document.getElementById('stampPop');
  s.textContent = ok ? '✓ 真棒' : '再接再厉';
  s.style.color = ok ? 'var(--bamboo-deep)' : 'var(--seal)';
  s.style.borderColor = ok ? 'var(--bamboo-deep)' : 'var(--seal)';
  s.classList.remove('go'); void s.offsetWidth; s.classList.add('go');
}

function renderSessionDone(noneToReview){
  const el = document.getElementById('screen-practice');
  if(noneToReview){
    el.innerHTML = `
      <div class="empty-state">
        <div class="ei">🎉</div>
        <h2 style="font-family:var(--serif);">今天的内容都复习完啦！</h2>
        <p>明天再来巩固新内容，或挑选更多课文加练。</p>
        <button class="btn btn-outline" style="margin-top:10px;" onclick="showScreen('lessons')">📖 调整复习范围</button>
      </div>`;
    return;
  }
  const total = SESSION.correct + SESSION.wrong;
  const pct = total? Math.round(SESSION.correct/total*100) : 100;
  el.innerHTML = `
    <div class="empty-state">
      <div class="ei">🏮</div>
      <h2 style="font-family:var(--serif);">本轮练习完成！</h2>
      <div class="stat-row" style="max-width:320px;margin:18px auto;">
        <div class="stat-box mastered"><div class="n">${SESSION.correct}</div><div class="l">答对</div></div>
        <div class="stat-box due"><div class="n">${SESSION.wrong}</div><div class="l">答错</div></div>
        <div class="stat-box"><div class="n">${pct}%</div><div class="l">正确率</div></div>
      </div>
      <div class="btn-row" style="max-width:340px;margin:0 auto;">
        <button class="btn btn-primary btn-block" onclick="startSession()">再来一轮</button>
        <button class="btn btn-outline btn-block" onclick="showScreen('home')">返回首页</button>
      </div>
    </div>`;
}

// ============ 错字本 / 统计页 ============
function renderStats(){
  const el = document.getElementById('screen-stats');
  const errItems = [];
  ITEMS.forEach(it=>{
    const st = PROGRESS[it.id];
    if(st && (st.lapses||0) > 0){
      errItems.push({it, lapses:st.lapses, lvl:masteryLevel(st)});
    }
  });
  errItems.sort((a,b)=>b.lapses-a.lapses);

  el.innerHTML = `
    <h2 class="section-title">📊 各课学习进度</h2>
    <div class="card" style="margin-bottom:10px;"><div class="card-inner" style="font-size:12px;color:var(--ink-soft);line-height:1.7;">
      💡 进度条反映「学习进度」：刚接触过算一部分，连续答对多次、间隔越拉越长才算「真正掌握」。
      所以哪怕已经做了很多题，刚开始几天进度条也会比较低，这是间隔重复正常的过程，不代表没有学习记录。
    </div></div>
    <div class="card"><div class="card-inner" id="lessonBars"></div></div>
    <h2 class="section-title">🔴 错字本 <span class="tag">${errItems.length} 项</span></h2>
    ${errItems.length===0? `<div class="empty-state"><div class="ei">✨</div>还没有错题记录，继续加油！</div>` :
    `<div class="error-list">${errItems.slice(0,60).map(e=>`
      <div class="error-item">
        <div>
          <div class="w">${e.it.kind==='word'? e.it.text : (e.it.focus||e.it.full.slice(0,10)+'…')}</div>
          <div class="meta">${e.it.grade}年级第${e.it.lessonNum}课 · ${e.it.kind==='word'?'词语':'句子'}</div>
        </div>
        <span class="lapses">错${e.lapses}次</span>
      </div>`).join('')}</div>`}

    <h2 class="section-title">📝 易错提示笔记</h2>
    <div class="card"><div class="card-inner" id="tipsArea"></div></div>
  `;
  const bars = document.getElementById('lessonBars');
  bars.innerHTML = LESSONS.map(l=>{
    const s = lessonStats(l.id);
    const caption = s.touched===0 ? '尚未开始'
      : `已学 ${s.touched}/${s.total} 题${s.mastered>0?` · 已掌握 ${s.mastered} 题`:''}`;
    return `<div style="margin-bottom:10px;">
      <div class="bar-row" style="margin-bottom:2px;"><div class="lbl">${l.grade}年-${l.lesson}课</div>
        <div class="bar-track"><div class="bar-fill" style="width:${s.score}%"></div></div>
        <div class="bar-pct">${s.score}%</div></div>
      <div style="margin-left:82px;font-size:10.5px;color:var(--ink-soft);">${caption}</div>
    </div>`;
  }).join('');

  const tipsArea = document.getElementById('tipsArea');
  tipsArea.innerHTML = `<div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">
    每课的字形拆解提示由听写表整理而来，可自行补充或修改。</div>
    <select id="tipLessonSel" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--card-line);margin-bottom:10px;">
      ${LESSONS.map(l=>`<option value="${l.id}">${l.grade}年级 第${l.lesson}课 《${l.title}》</option>`).join('')}
    </select>
    <div id="tipBuiltin" style="font-size:13px;color:var(--ink-soft);margin-bottom:8px;"></div>
    <textarea class="tip-edit" id="tipEditBox" placeholder="补充易错提示，例如：脸-月+佥，俭-亻+佥……"></textarea>
    <button class="btn btn-secondary" style="margin-top:8px;" id="saveTipBtn">💾 保存笔记</button>`;
  function loadTipFor(lessonId){
    const lesson = LESSONS.find(l=>l.id===lessonId);
    document.getElementById('tipBuiltin').innerHTML = lesson.tips.length
      ? '📌 ' + lesson.tips.join('<br>📌 ') : '（暂无内置提示）';
    document.getElementById('tipEditBox').value = CUSTOM_TIPS[lessonId] || '';
  }
  document.getElementById('tipLessonSel').addEventListener('change', e=>loadTipFor(e.target.value));
  document.getElementById('saveTipBtn').addEventListener('click', ()=>{
    const id = document.getElementById('tipLessonSel').value;
    CUSTOM_TIPS[id] = document.getElementById('tipEditBox').value;
    saveTips();
    document.getElementById('saveTipBtn').textContent = '✅ 已保存';
    setTimeout(()=>{ document.getElementById('saveTipBtn').textContent='💾 保存笔记'; }, 1200);
  });
  loadTipFor(LESSONS[0].id);
}

// ============ 题库管理（Admin） ============
function renderAdmin(){
  const el = document.getElementById('screen-admin');
  const all = effectiveConfusables();
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <button class="icon-btn" onclick="showScreen('home')">←</button>
      <h2 class="section-title" style="margin:0;">📋 题库管理</h2>
    </div>
    <div class="card"><div class="card-inner" style="font-size:12px;color:var(--ink-soft);line-height:1.7;">
      这里管理「形近字辨析」的出题内容。遇到出得不好的题，也可以直接在练习时点「🚫 这题出得不好」一键处理，效果和在这里操作一样。
    </div></div>

    <h2 class="section-title">🚫 不再用来出题的简单字 <span class="tag">${BLOCKED_CHARS.size} 个</span></h2>
    <div class="card"><div class="card-inner">
      <div class="tag-row" id="blockedCharList"></div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input id="newBlockChar" maxlength="6" placeholder="输入要屏蔽的字，如：子" style="flex:1;padding:10px;border:1px solid var(--card-line);border-radius:8px;font-size:14px;">
        <button class="btn btn-secondary" id="addBlockBtn">添加</button>
      </div>
      <button class="btn btn-ghost btn-block" style="margin-top:10px;font-size:12px;" id="resetBlockBtn">恢复默认屏蔽字表</button>
    </div></div>

    <h2 class="section-title">✏️ 精选选择题库 <span class="tag">${all.length} 条</span></h2>
    <button class="btn btn-primary btn-block" id="addQuestionBtn">＋ 新增一道选择题</button>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
      ${all.map(c=>`
        <div class="card" style="margin-bottom:0;">
          <div class="card-inner">
            <div style="font-size:13.5px;line-height:1.6;">${c.sentence.split(c.blank).join(`<b style="color:var(--seal);">[${c.blank}]</b>`)}</div>
            <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">选项：${c.options.join(' / ')}</div>
            <div style="font-size:11px;color:var(--ink-soft);margin-top:2px;">${c.note||''}</div>
            <div class="tag-row" style="margin-top:8px;">
              <span class="pill">${LESSONS.find(l=>l.id===c.lessonId)?.title || c.lessonId}</span>
              <span class="pill">${c._src==='builtin'?'内置':'自定义'}</span>
            </div>
            <div class="btn-row" style="margin-top:10px;">
              <button class="tool-btn" data-edit="${c._key}">✏️ 编辑</button>
              <button class="tool-btn" style="color:var(--seal-deep);" data-del="${c._key}">🗑️ 删除</button>
            </div>
          </div>
        </div>`).join('')}
    </div>
  `;
  renderBlockedChips();
  document.getElementById('addBlockBtn').addEventListener('click', ()=>{
    const input = document.getElementById('newBlockChar');
    const chars = input.value.trim().split('').filter(isHanzi);
    if(chars.length===0) return;
    chars.forEach(ch=>BLOCKED_CHARS.add(ch));
    saveBlockedChars();
    input.value = '';
    renderBlockedChips();
  });
  document.getElementById('resetBlockBtn').addEventListener('click', ()=>{
    if(!confirm('恢复为系统默认的屏蔽字表？你自己添加的会被清空。')) return;
    BLOCKED_CHARS = new Set(DEFAULT_BLOCKED_CHARS);
    saveBlockedChars();
    renderBlockedChips();
  });
  document.getElementById('addQuestionBtn').addEventListener('click', ()=>openConfusableForm(null));
  el.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.edit;
      const found = all.find(c=>c._key===key);
      if(found) openConfusableForm(found);
    });
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!confirm('确定删除这道题吗？')) return;
      deleteConfusableByKey(btn.dataset.del);
      renderAdmin();
    });
  });
}
function renderBlockedChips(){
  const wrap = document.getElementById('blockedCharList');
  if(!wrap) return;
  const arr = Array.from(BLOCKED_CHARS);
  wrap.innerHTML = arr.length===0 ? '<span style="font-size:12px;color:var(--ink-soft);">（空）</span>' :
    arr.map(ch=>`<span class="pill" style="cursor:pointer;" data-unblock="${ch}">${ch} ✕</span>`).join('');
  wrap.querySelectorAll('[data-unblock]').forEach(p=>{
    p.addEventListener('click', ()=>{
      BLOCKED_CHARS.delete(p.dataset.unblock);
      saveBlockedChars();
      renderBlockedChips();
    });
  });
}
function deleteConfusableByKey(key){
  if(key.startsWith('cur:')){ DELETED_BUILTIN_KEYS.add(key); saveDeletedBuiltins(); }
  else if(key.startsWith('usr:')){ const id=key.split(':')[1]; CUSTOM_CONFUSABLES = CUSTOM_CONFUSABLES.filter(c=>c.id!==id); saveCustomConfusables(); }
}
function openConfusableForm(existing){
  const isEdit = !!existing;
  document.getElementById('settingsContent').innerHTML = `
    <h2 class="section-title" style="margin-top:0;">${isEdit?'✏️ 编辑题目':'＋ 新增题目'}</h2>
    <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">句子中要出现「正确答案」这个字，系统会自动把它挖空。四个选项需互不相同，且必须包含正确答案。</div>
    <label style="font-size:12.5px;color:var(--ink-soft);">所属课文</label>
    <select id="cfLesson" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--card-line);margin:6px 0 12px 0;">
      ${LESSONS.map(l=>`<option value="${l.id}" ${existing&&existing.lessonId===l.id?'selected':''}>${l.grade}年级 第${l.lesson}课 《${l.title}》</option>`).join('')}
    </select>
    <label style="font-size:12.5px;color:var(--ink-soft);">例句（须包含正确答案这个字）</label>
    <textarea class="tip-edit" id="cfSentence" style="min-height:60px;">${existing?existing.sentence:''}</textarea>
    <label style="font-size:12.5px;color:var(--ink-soft);">正确答案（一个字）</label>
    <input id="cfBlank" maxlength="2" value="${existing?existing.blank:''}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--card-line);margin:6px 0 12px 0;font-size:16px;">
    <label style="font-size:12.5px;color:var(--ink-soft);">四个选项（用、或空格隔开，需包含正确答案）</label>
    <input id="cfOptions" value="${existing?existing.options.join('、'):''}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--card-line);margin:6px 0 12px 0;font-size:16px;">
    <label style="font-size:12.5px;color:var(--ink-soft);">提示说明（选填）</label>
    <textarea class="tip-edit" id="cfNote" style="min-height:50px;">${existing?(existing.note||''):''}</textarea>
    <div id="cfError" style="color:var(--seal-deep);font-size:12.5px;margin-top:8px;"></div>
    <button class="btn btn-primary btn-block" style="margin-top:14px;" id="cfSaveBtn">💾 保存</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px;" onclick="closeSettingsThenAdmin()">取消</button>
  `;
  document.getElementById('cfSaveBtn').addEventListener('click', ()=>{
    const lessonId = document.getElementById('cfLesson').value;
    const sentence = document.getElementById('cfSentence').value.trim();
    const blank = document.getElementById('cfBlank').value.trim();
    const options = document.getElementById('cfOptions').value.split(/[、,，\s]+/).map(s=>s.trim()).filter(Boolean);
    const note = document.getElementById('cfNote').value.trim();
    const errBox = document.getElementById('cfError');
    if(!sentence || !blank || options.length!==4){ errBox.textContent='请填写完整：例句、正确答案，并提供 4 个选项。'; return; }
    if(!sentence.includes(blank)){ errBox.textContent='例句中必须包含正确答案这个字，这样系统才能挖空。'; return; }
    if(!options.includes(blank)){ errBox.textContent='4 个选项里必须包含正确答案。'; return; }
    if(new Set(options).size!==4){ errBox.textContent='4 个选项必须互不相同。'; return; }
    if(isEdit && existing._src==='builtin'){
      // 内置题目编辑 = 屏蔽原题 + 新增一条自定义题，保持行为一致且不修改只读的内置数据
      DELETED_BUILTIN_KEYS.add(existing._key); saveDeletedBuiltins();
      CUSTOM_CONFUSABLES.push({id:newCustomId(), lessonId, sentence, blank, options, note});
    } else if(isEdit){
      const id = existing._key.split(':')[1];
      const idx = CUSTOM_CONFUSABLES.findIndex(c=>c.id===id);
      if(idx>-1) CUSTOM_CONFUSABLES[idx] = {id, lessonId, sentence, blank, options, note};
    } else {
      CUSTOM_CONFUSABLES.push({id:newCustomId(), lessonId, sentence, blank, options, note});
    }
    saveCustomConfusables();
    closeSettingsThenAdmin();
  });
  document.getElementById('settingsModal').classList.add('show');
}


(async function init(){
  await loadAll();
  renderCountdown();
  renderHome();
})();

</script>
